<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Therese Portfolio</title>
    <link rel="stylesheet" href="CSS/style.css" />
  </head>
  <body>
    <header>
      <nav aria-label="Main menu" class="nav">
        <a href="index.html">Home</a>
        <a href="projects.html">Project</a>
        <a href="about.html">About</a>
        <a href="contact.html">Contact</a>
      </nav>
    </header>
    <main>
      <h1 class="h1c">Contact me</h1>
      <div class="form-wrapper">
        <form
          aria-label="Contact form"
          action="https://postman-echo.com/get"
          method="get"
          class="contact"
        >
          <label for="name">Name:</label>
          <input type="text" id="name" name="name" required />
          <label for="email">Enter your email:</label>
          <input type="email" id="email" name="email" />
          <label id="textarea">Message:</label>
          <textarea
            aria-label="Message area"
            name="message"
            rows="10"
            cols="20"
          >
          </textarea>
          <input type="submit" value="Send" formtarget="_blank" />
        </form>
      </div>
    </main>
    <footer>© 2026 THJOX. All rights reserved.</footer>
  </body>
</html>
